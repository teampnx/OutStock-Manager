# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "5a10d65799a7a6002c0c76972a346567"
name = "Curatify"
application_url = "https://turmoil-stingily-spinach.ngrok-free.dev"
embedded = true

[build]
# Syncs application_url + redirect_urls to the active dev tunnel on `shopify app dev`.
# For stable local dev, use `npm run dev` (ngrok static domain) — see dev/ngrok.env.example.
automatically_update_urls_on_dev = true
dev_store_url = "outstock-test-lionlx2x.myshopify.com"

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/collections/create"
  topics = [ "collections/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/collections/delete"
  topics = [ "collections/delete" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/collections/update"
  topics = [ "collections/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/inventory_levels/update"
  topics = [ "inventory_levels/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/products/update"
  topics = [ "products/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions/update"
  topics = [ "app_subscriptions/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_inventory,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
# Placeholder host — replaced with the active dev tunnel when `shopify app dev` runs.
redirect_urls = [
  "https://turmoil-stingily-spinach.ngrok-free.dev/auth/callback",
  "https://turmoil-stingily-spinach.ngrok-free.dev/auth/shopify/callback",
  "https://turmoil-stingily-spinach.ngrok-free.dev/api/auth/callback",
]
